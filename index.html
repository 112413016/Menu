<!DOCTYPE html>
<html>
<head>
    <title>Food Menu</title>
</head>
<body>

    <h1>Food Menu</h1>

    <form>

        <h3>Select Your Food (Radio Button)</h3>

        <input type="radio" id="pizza" name="food">
        <label for="pizza">Pizza</label><br>

        <input type="radio" id="burger" name="food">
        <label for="burger">Burger</label><br>

        <input type="radio" id="dosa" name="food">
        <label for="dosa">Dosa</label><br><br>

        <h3>Select Extra Items (Checkbox)</h3>

        <input type="checkbox" id="fries">
        <label for="fries">French Fries</label><br>

        <input type="checkbox" id="juice">
        <label for="juice">Juice</label><br>

        <input type="checkbox" id="icecream">
        <label for="icecream">Ice Cream</label><br><br>

        <input type="submit" value="Place Order">
        <input type="reset" value="Reset">

    </form>

</body>
</html>
